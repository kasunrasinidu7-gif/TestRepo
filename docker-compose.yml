# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Orchestrates the TaskFlow backend and frontend containers.
# Database is now hosted on Supabase — no local MySQL container needed.
#
# RUN WITH:  docker-compose up --build
# STOP WITH: docker-compose down
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      # Supabase connection string — set in root .env file
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 10
      CLIENT_URL: http://localhost:3000
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded files outside the container so they survive rebuilds
      - uploads_data:/app/uploads

  # ── Frontend (Nginx serving built React app) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  uploads_data:
